<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - DeMar Transportation</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0f4f8;
        color: #0a1628;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
      }
      .logo {
        height: 56px;
        margin-bottom: 2rem;
      }
      .code {
        font-size: 4rem;
        font-weight: 700;
        color: #0a1628;
        margin-bottom: 0.5rem;
      }
      h2 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        color: #64748b;
        font-size: 1.1rem;
        margin-bottom: 2rem;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.2s;
      }
      .btn:hover { opacity: 0.9; }
      .btn-primary {
        background: #0a1628;
        color: #fff;
      }
      .btn-outline {
        border: 1px solid #0a1628;
        color: #0a1628;
        background: transparent;
      }
      .btn-outline:hover { background: #0a1628; color: #fff; }
    </style>
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <noscript>
      <div class="container">
        <img src="/demar-logo-official.png" alt="DeMar Transportation" class="logo">
        <div class="code">404</div>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <div class="actions">
          <a href="/" class="btn btn-primary">Return Home</a>
          <a href="/quote" class="btn btn-outline">Request a Quote</a>
        </div>
      </div>
    </noscript>
  </body>
</html>
