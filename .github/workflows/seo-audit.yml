name: SEO Audit

on:
  schedule:
    - cron: '0 16 * * *'  # Daily at 9am PDT
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install monitoring dependencies
        run: cd monitoring && npm ci

      - name: Run SEO audit
        env:
          DISCORD_SEO_WEBHOOK_URL: ${{ secrets.DISCORD_SEO_WEBHOOK_URL }}
        run: cd monitoring && node seo-audit.mjs
