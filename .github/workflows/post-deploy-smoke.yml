name: Post-Deploy Smoke Tests

on:
  workflow_run:
    workflows: ["Deploy to GreenGeeks"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Wait for deploy to propagate
        run: sleep 30

      - name: Run smoke tests
        id: smoke
        run: npm run test:smoke
        continue-on-error: true

      - name: Alert on failure (auto-revert disabled)
        if: steps.smoke.outcome == 'failure'
        run: |
          MERGE_COMMIT=$(git log main -1 --format="%H")
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"🔴 **Post-Deploy Smoke Tests FAILED** for commit \`${MERGE_COMMIT:0:7}\`\n\n🔗 Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify success
        if: steps.smoke.outcome == 'success'
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content":"✅ **Post-Deploy Smoke Tests Passed** — site is healthy."}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
