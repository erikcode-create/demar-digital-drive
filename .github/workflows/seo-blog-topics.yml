name: SEO Blog Post Writer

on:
  schedule:
    - cron: '0 19 * * *'  # 12pm PDT daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  write-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install project dependencies
        run: npm ci

      - name: Install monitoring dependencies
        run: cd monitoring && npm ci

      - name: Run blog post writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_SEO_WEBHOOK_URL: ${{ secrets.DISCORD_SEO_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd monitoring && node seo/blog-topic-generator.mjs
