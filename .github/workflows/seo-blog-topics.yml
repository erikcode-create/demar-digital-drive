name: SEO Blog Topic Generator

on:
  schedule:
    - cron: '0 19 * * *'  # 12pm PDT daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  suggest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install monitoring dependencies
        run: cd monitoring && npm ci

      - name: Run blog topic generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_SEO_WEBHOOK_URL: ${{ secrets.DISCORD_SEO_WEBHOOK_URL }}
        run: cd monitoring && node seo/blog-topic-generator.mjs
