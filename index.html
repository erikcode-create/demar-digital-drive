<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="canonical" href="https://demartransportation.com/" />
    <title>DeMar Transportation - Professional Freight Transportation Services</title>
    <meta name="description" content="DeMar Transportation: dry van, reefer, flatbed & hazmat freight services. US-based carrier with competitive rates and 24/7 service. Call (775) 230-4767." />

    <!-- Open Graph -->
    <meta property="og:title" content="DeMar Transportation - Professional Freight Services" />
    <meta property="og:description" content="US-based freight carrier providing dry van, reefer, flatbed, and hazmat transportation with competitive rates and 24/7 service." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://demartransportation.com/" />
    <meta property="og:image" content="https://demartransportation.com/demar-logo-official.png" />
    <meta property="og:site_name" content="DeMar Transportation" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DeMar Transportation - Professional Freight Services" />
    <meta name="twitter:description" content="US-based freight carrier with competitive rates and 24/7 service." />
    <meta name="twitter:image" content="https://demartransportation.com/demar-logo-official.png" />

    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TransportCompany",
      "name": "DeMar Transportation",
      "url": "https://demartransportation.com",
      "logo": "https://demartransportation.com/demar-logo-official.png",
      "description": "Professional freight transportation services including dry van, reefer, flatbed, and hazmat shipping.",
      "telephone": "+1-775-230-4767",
      "email": "info@DeMarTransportation.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "10471 Double R Blvd",
        "addressLocality": "Reno",
        "addressRegion": "NV",
        "postalCode": "89521",
        "addressCountry": "US"
      },
      "areaServed": {
        "@type": "Country",
        "name": "United States"
      },
      "serviceType": ["Dry Van", "Reefer", "Flatbed", "Box Truck", "Sprinter Van", "Hazmat/Fuel"],
      "availableChannel": {
        "@type": "ServiceChannel",
        "servicePhone": {
          "@type": "ContactPoint",
          "telephone": "+1-775-230-4767",
          "contactType": "customer service",
          "availableLanguage": "English",
          "hoursAvailable": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
            "opens": "00:00",
            "closes": "23:59"
          }
        }
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DeMar Transportation",
      "url": "https://demartransportation.com",
      "description": "Professional freight transportation services including dry van, reefer, flatbed, and hazmat shipping across the United States.",
      "publisher": {
        "@type": "Organization",
        "name": "DeMar Transportation",
        "logo": {
          "@type": "ImageObject",
          "url": "https://demartransportation.com/demar-logo-official.png"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://demartransportation.com/resources?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- SPA redirect handler: converts /?/path back to /path for React Router -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
